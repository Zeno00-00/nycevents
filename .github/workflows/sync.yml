name: Daily Sync

on:
  schedule:
    # 5:00 AM ET → 09:00 UTC during EDT (Mar–Nov) — adjust to 10:00 UTC in EST if preferred.
    - cron: "0 9 * * *"
  workflow_dispatch: {}        # allows manual "Run workflow" button

permissions:
  contents: write              # allow the action to commit the updated events.json

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        env:
          SMTP_HOST:  ${{ secrets.SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.SMTP_PORT }}
          SMTP_USER:  ${{ secrets.SMTP_USER }}
          SMTP_PASS:  ${{ secrets.SMTP_PASS }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: python scripts/sync.py

      - name: Commit updated data
        run: |
          git config user.name  "nycevents-bot"
          git config user.email "nycevents-bot@users.noreply.github.com"
          git add web/data/events.json scripts/last_sync.log
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "data: daily sync $(date -u +%F)"
            git push
          fi
