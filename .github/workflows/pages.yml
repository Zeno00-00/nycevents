name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    # Re-deploy whenever the daily sync finishes — its commits don't fire
    # the `push` trigger above (GitHub blocks GITHUB_TOKEN commits from
    # triggering other workflows, to prevent loops).
    workflows: ["Daily Sync"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
        with:
          enablement: true       # auto-enable Pages if not already on
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
